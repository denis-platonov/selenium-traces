name: Publish

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish-github-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Configure Maven servers
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        env:
          PUBLISHER_ID: ${{ vars.PUBLISHER_ID }}
          PUBLISHER_NAME: ${{ vars.PUBLISHER_NAME }}
          PUBLISHER_EMAIL: ${{ vars.PUBLISHER_EMAIL }}
        run: >
          mvn -B -ntp -Pgithub-publish deploy -DskipTests
          -Dpublish.github.owner=${{ github.repository_owner }}
          -Dpublish.github.repo=${{ github.event.repository.name }}

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: publish-github-packages
    if: ${{ secrets.CENTRAL_TOKEN_USERNAME != '' && secrets.CENTRAL_TOKEN_PASSWORD != '' && secrets.GPG_PRIVATE_KEY != '' && secrets.GPG_PASSPHRASE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 and import GPG key
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Maven servers
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_TOKEN_USERNAME}</username>
                <password>${env.CENTRAL_TOKEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}

      - name: Publish to Maven Central
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          PUBLISHER_ID: ${{ vars.PUBLISHER_ID }}
          PUBLISHER_NAME: ${{ vars.PUBLISHER_NAME }}
          PUBLISHER_EMAIL: ${{ vars.PUBLISHER_EMAIL }}
        run: >
          mvn -B -ntp -Pcentral-publish deploy -DskipTests
          -Dpublish.github.owner=${{ github.repository_owner }}
          -Dpublish.github.repo=${{ github.event.repository.name }}
